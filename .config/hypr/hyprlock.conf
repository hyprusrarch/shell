# HYPRLOCK CONFIG - DYNAMIC SYNC THEME

# 1. Fallback colors (declared FIRST so they can be overwritten)
$base = rgb(3E2723)
$text = rgb(FFFDD0)
$accent = rgb(D2B48C)
$surface = rgb(2E1E1A)

# 2. Source dynamic variables (declared SECOND to overwrite fallbacks)
source = ~/.cache/hyprlock-colors.conf

general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}

background {
    monitor =
    color = $base
    path = screenshot
    blur_passes = 2
    contrast = 0.8916
    brightness = 0.8172
}

# TIME
label {
    monitor =
    text = $TIME
    color = $text
    font_size = 120
    font_family = JetBrains Mono Nerd Font ExtraBold
    position = 0, -150
    halign = center
    valign = top
}

# USER GREETING
label {
    monitor =
    text = Hello, $USER
    color = $accent
    font_size = 25
    font_family = JetBrains Mono Nerd Font
    position = 0, -40
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 250, 60
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = $accent
    inner_color = $surface
    font_color = $text
    fade_on_empty = true
    placeholder_text = <i>Brewing security...</i>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}
