#########################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hyprland.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

autogenerated = 0

################
### MONITORS ###
################

monitor=DP-2,5120x1440@144,0x0,1
monitor=,preferred,auto,1.2


###################
### MY PROGRAMS ###
###################

$terminal = foot
$fileManager = nautilus
$menu = rofi -show drun


#################
### AUTOSTART ###
#################

exec-once = swaync
exec-once = env QML_DISABLE_DISK_CACHE=1 QSG_RENDER_LOOP=basic QT_QUICK_BACKEND=software qs -p ~/.config/quickshell/bar.qml
exec-once = awww-daemon
exec-once = wl-paste --type text --watch sh -c 'clip=$(cat); if [[ "$clip" != *"<img src="* && "$clip" != *"<meta http-equiv="* ]]; then echo -n "$clip" | cliphist store; fi'
exec-once = wl-paste --type image --watch cliphist store
exec-once = export GTK_IM_MODULE=fcitx5
exec-once = export QT_IM_MODULE=fcitx5
exec-once = export XMODIFIERS=@im=fcitx5
exec-once = export INPUT_METHOD=fcitx5
exec-once = systemctl --user disable warp-taskbar
exec-once = sleep 1 ; systemctl --user stop warp-taskbar
exec-once = fcitx5
exec-once = export SDL_IM_MODULE=fcitx5
exec-once = systemctl --user start hyprpolkitagent
exec-once = hypridle

#############################
### ENVIRONMENT VARIABLES ###
env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = AQ_DRM_DEVICES,/dev/dri/card0:/dev/dri/card1
env = LIBVA_DRIVER_NAME,iHD
env = __GLX_VENDOR_LIBRARY_NAME,mesa
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Breeze
env = ELECTRON_OZONE_PLATFORM_HINT,auto
#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 3
    gaps_out = 4
    border_size = 3
    col.active_border = rgba(5e81acff) rgba(81a1c1ff) 45deg
    col.inactive_border = rgba(595959aa)
    resize_on_border = true
    layout = dwindle
}

decoration {
    rounding = 5
    active_opacity = 1.0
    inactive_opacity = 0.8

    shadow {
        enabled = false
        range = 0
        render_power = 0
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = false
        size = 0
        passes = 0
        vibrancy = 0
    }
}

decoration:blur:enabled = false
decoration:shadow:enabled = false
animations {
    enabled = yes, please :)

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

dwindle {
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = false
}
# REMOVE it from your misc block and add this:
debug {
    vfr = true
}

#############
### INPUT ###
#############

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
    }
}

gestures {
}

device {
    name = epic-mouse-v1
    sensitivity = 1
}


###################
### KEYBINDINGS ###
###################

$mainMod = SUPER


bind = $mainMod, Q, exec, $terminal
bind = $mainMod, X, killactive,
bind = $mainMod SHIFT, M, exit
bind = $mainMod, M, exec, hyprlock
bind = $mainMod, G, exec, ~/.scripts/record.sh
bind = , F6, exec, ~/.scripts/autoclicker.sh
bind = CTRL ALT, DELETE, exec, qs -p ~/.config/quickshell/powermenu.qml
bind = $mainMod, B, exec, ~/bar.sh
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, SPACE, togglefloating,
bind = $mainMod, R, exec, ~/.config/quickshell/scripts/launcher.sh
bind = $mainMod, period, exec, rofi -modi emoji -show emoji -kb-secondary-copy "" -kb-custom-1 Ctrl+c -theme ~/.config/rofi/config.rasi
bind = $mainMod SHIFT, P, exec, hyprpicker
bind = $mainMod SHIFT, S, exec, hyprshot -m region -o ~/Pictures/
bind = , PRINT, exec, hyprshot -m window -o ~/Pictures/

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, F1, workspace, 1
bind = $mainMod, F2, workspace, 2
bind = $mainMod, F3, workspace, 3
bind = $mainMod, F4, workspace, 4
bind = $mainMod, F5, workspace, 5
bind = $mainMod, F6, workspace, 6
bind = $mainMod, F7, workspace, 7
bind = $mainMod, F8, workspace, 8
bind = $mainMod, F9, workspace, 9
bind = $mainMod, F10, workspace, 10

bind = $mainMod, 1, movetoworkspace, 1
bind = $mainMod, 2, movetoworkspace, 2
bind = $mainMod, 3, movetoworkspace, 3
bind = $mainMod, 4, movetoworkspace, 4
bind = $mainMod, 5, movetoworkspace, 5
bind = $mainMod, 6, movetoworkspace, 6
bind = $mainMod, 7, movetoworkspace, 7
bind = $mainMod, 8, movetoworkspace, 8
bind = $mainMod, 9, movetoworkspace, 9
bind = $mainMod, 0, movetoworkspace, 10

bind = $mainMod, S, togglespecialworkspace, magic

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


xwayland {
    force_zero_scaling = true
}
